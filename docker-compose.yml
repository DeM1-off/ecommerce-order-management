services:
  nginx:
    container_name: ${APP_ENV}.${DOCKER_APP_NAME}.nginx
    image: nginx:alpine
    working_dir: /var/www/app
    volumes:
      - .:/var/www/app
      - ./.docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${DOCKER_NGINX_PORT}:80"
    depends_on:
      - php-fpm

  postgres:
    container_name: ${APP_ENV}.${DOCKER_APP_NAME}.postgres
    image: postgis/postgis:16-3.4-alpine
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
    ports:
      - "${DOCKER_POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

  postgres-test:
    container_name: ${APP_ENV}.${DOCKER_APP_NAME}.postgres-test
    image: postgis/postgis:16-3.4-alpine
    volumes:
      - ./.docker/postgres/data-test:/var/lib/postgresql/data
    ports:
      - "${DOCKER_POSTGRES_TEST_PORT}:5432"
    environment:
      - POSTGRES_DB=${DB_TEST_DATABASE}
      - POSTGRES_USER=${DB_TEST_USERNAME}
      - POSTGRES_PASSWORD=${DB_TEST_PASSWORD}

  php-fpm:
    container_name: ${APP_ENV}.${DOCKER_APP_NAME}.php-fpm
    build: .docker/php-fpm
    working_dir: /var/www/app
    volumes:
      - ./.docker/.cache:/var/www/.cache
      - ./.docker/.config:/var/www/.config
      - ./.docker/php-fpm/.bash_history:/var/www/.bash_history
      - ./.docker/php-fpm/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./:/var/www/app
    environment:
      - PHP_IDE_CONFIG=serverName=${APP_ENV}.${DOCKER_APP_NAME}.php-fpm
    extra_hosts:
      - host.docker.internal:host-gateway